[git]
# Conventional commit configuration
conventional_commits = true
commit_parsers = [
    { message = "^feat(pkg/[^ ]+)?(:| )", group = "Features", default_scope = "other" },
    { message = "^fix(pkg/[^ ]+)?(:| )", group = "Bug Fixes", default_scope = "other" },
    { message = "^docs(:| )", group = "Documentation" },
    { message = "^style(:| )", group = "Styling" },
    { message = "^refactor(pkg/[^ ]+)?(:| )", group = "Refactoring", default_scope = "other" },
    { message = "^perf(pkg/[^ ]+)?(:| )", group = "Performance", default_scope = "other" },
    { message = "^test(pkg/[^ ]+)?(:| )", group = "Testing", default_scope = "other" },
    { message = "^build(pkg/[^ ]+)?(:| )", group = "Builds", default_scope = "other" },
    { message = "^ci(pkg/[^ ]+)?(:| )", group = "CI/CD", default_scope = "other" },
    { message = "^chore(pkg/[^ ]+)?(:| )", group = "Maintenance", default_scope = "other" },
    { message = "^revert(:| )", group = "Reverts" },
]
protect_parsed_from_tree_group = ["chore", "fix"]
filter_grouping = ["Security"]

# Tag configuration
tag_pattern = "v([0-9].*)"
timestamp_format = "%Y-%m-%d"
sort_changelog = true

# Output configuration
[changelog]
# Path to the changelog file (relative to config)
path = "CHANGELOG.md"
# Include unreleased changes
include_unreleased = true
# Unreleased group name
unreleased_placeholder = "## [Unreleased]"
# Header for changelog
header = """
    # Changelog

    All notable changes to this project will be documented in this file.

    The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
    and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

    <!-- generated by git-cliff; DO NOT EDIT -->
    """

# Body configuration
[body]
# Wrap width
wrap = 80

# Footer configuration
[footer]
# Include timestamp
timestamp = true
# Include links
links = """
    [keep aangelog]: https://keepachangelog.com/en/2.1.0/
    [semver]: https://semver.org/spec/v2.0.0.html
    """

# Remote configuration
[remote]
# Remote name
name = "origin"
# URL template
url = "https://github.com/harpertoken/harper/releases/tag/{{tag}}"

# Package configuration
[package]
# Enable package separate changelog generation
enabled = false
