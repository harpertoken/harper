[ advisories ]
# Multiple dependencies are unmaintained but pose no security risk
# This is acceptable as it's not a security vulnerability
ignore = [
    "RUSTSEC-2025-0141",  # bincode unmaintained
    "RUSTSEC-2024-0388",  # derivative unmaintained
    "RUSTSEC-2024-0384",  # instant unmaintained
    "RUSTSEC-2024-0320",  # yaml-rust unmaintained
    "RUSTSEC-2024-0436",  # paste unmaintained
]

[ bans ]
# No bans specified

[ licenses ]
# Allow common open-source licenses
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "0BSD",
    "Zlib",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "NCSA",
    "WTFPL",
]

[ sources ]
# No source restrictions
