name: Post Auto-Merge CI

on:
  workflow_run:
    workflows: ["Auto Merge"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  post-merge-ci:
    if: github.repository_owner == 'harpertoken' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Determine merged PR and commit
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            let prNumber = undefined;
            const prs = run.pull_requests || [];
            if (prs.length > 0) {
              prNumber = prs[0].number;
            } else {
              core.info('No pull_request payload info; attempting to locate PR via commit SHA.');
              const headSha = run.head_sha;
              if (!headSha) {
                core.notice('Workflow run has no head SHA. Skipping.');
                core.setOutput('skip', 'true');
                return;
              }
              const commitPRs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: headSha,
              });
              if (commitPRs.data.length === 0) {
                core.notice('No PR found for commit. Skipping.');
                core.setOutput('skip', 'true');
                return;
              }
              prNumber = commitPRs.data[0].number;
            }
            core.info(`Associated PR #${prNumber}`);
            for (let i = 0; i < 20; i++) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              if (data.merged) {
                core.info(`PR #${prNumber} merged as ${data.merge_commit_sha}`);
                core.setOutput('skip', 'false');
                core.setOutput('pr_number', prNumber);
                core.setOutput('merge_sha', data.merge_commit_sha);
                return;
              }
              core.info('PR not merged yet. Waiting 15s...');
              await new Promise((resolve) => setTimeout(resolve, 15000));
            }
            core.setFailed(`PR #${prNumber} was not merged within the wait window.`);
      - name: Lock merged PR
        if: steps.pr.outputs.skip != 'true'
        run: gh pr lock ${{ steps.pr.outputs.pr_number }} --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout merged commit
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.merge_sha || 'main' }}

      - name: Install Rust
        if: steps.pr.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Post-merge cargo fmt
        if: steps.pr.outputs.skip != 'true'
        run: cargo fmt --all -- --check

      - name: Post-merge cargo clippy
        if: steps.pr.outputs.skip != 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Post-merge cargo test
        if: steps.pr.outputs.skip != 'true'
        run: cargo test --all --all-features
