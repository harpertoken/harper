name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'lib/harper-core/**'
      - 'lib/harper-ui/**'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get current versions
        id: versions
        run: |
          CORE_VERSION=$(grep -m1 '^version = ' lib/harper-core/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          UI_VERSION=$(grep -m1 '^version = ' lib/harper-ui/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "core=$CORE_VERSION" >> $GITHUB_OUTPUT
          echo "ui=$UI_VERSION" >> $GITHUB_OUTPUT

      - name: Analyze commits for version bump
        id: analyze
        run: |
          # Find last release tags for each package
          CORE_LAST_TAG=$(git describe --tags --abbrev=0 --match 'harper-core-*' 2>/dev/null || echo "")
          UI_LAST_TAG=$(git describe --tags --abbrev=0 --match 'harper-ui-*' 2>/dev/null || echo "")
          
          echo "core_last_tag=${CORE_LAST_TAG:-none}" >> $GITHUB_OUTPUT
          echo "ui_last_tag=${UI_LAST_TAG:-none}" >> $GITHUB_OUTPUT
          
          # Get commits since last release for harper-core
          if [ -n "$CORE_LAST_TAG" ]; then
            CORE_COMMITS=$(git log "$CORE_LAST_TAG..HEAD" --oneline -- lib/harper-core/ || true)
          else
            CORE_COMMITS=$(git log --oneline -- lib/harper-core/ | head -30 || true)
          fi
          
          # Get commits since last release for harper-ui
          if [ -n "$UI_LAST_TAG" ]; then
            UI_COMMITS=$(git log "$UI_LAST_TAG..HEAD" --oneline -- lib/harper-ui/ || true)
          else
            UI_COMMITS=$(git log --oneline -- lib/harper-ui/ | head -30 || true)
          fi
          
          CORE_HAS_FEAT=$(echo "$CORE_COMMITS" | grep -cE "\[feat\]|feat:" || echo "0")
          CORE_HAS_FIX=$(echo "$CORE_COMMITS" | grep -cE "\[fix\]|fix:" || echo "0")
          CORE_HAS_BREAKING=$(echo "$CORE_COMMITS" | grep -cE "!:|BREAKING" || echo "0")
          
          UI_HAS_FEAT=$(echo "$UI_COMMITS" | grep -cE "\[feat\]|feat:" || echo "0")
          UI_HAS_FIX=$(echo "$UI_COMMITS" | grep -cE "\[fix\]|fix:" || echo "0")
          UI_HAS_BREAKING=$(echo "$UI_COMMITS" | grep -cE "!:|BREAKING" || echo "0")
          
          echo "core_commits<<EOF" >> $GITHUB_OUTPUT
          echo "$CORE_COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "ui_commits<<EOF" >> $GITHUB_OUTPUT
          echo "$UI_COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "core_feat=$CORE_HAS_FEAT" >> $GITHUB_OUTPUT
          echo "core_fix=$CORE_HAS_FIX" >> $GITHUB_OUTPUT
          echo "core_break=$CORE_HAS_BREAKING" >> $GITHUB_OUTPUT
          echo "ui_feat=$UI_HAS_FEAT" >> $GITHUB_OUTPUT
          echo "ui_fix=$UI_HAS_FIX" >> $GITHUB_OUTPUT
          echo "ui_break=$UI_HAS_BREAKING" >> $GITHUB_OUTPUT

      - name: Calculate new versions
        id: new_versions
        run: |
          USER_BUMP=${{ github.event.inputs.version_bump }}
          
          determine_bump() {
            local user=$1
            local has_feat=$2
            local has_break=$3
            if [ "$has_break" -gt 0 ]; then
              echo "major"
            elif [ "$has_feat" -gt 0 ] || [ "$user" = "minor" ]; then
              echo "minor"
            else
              echo "$user"
            fi
          }
          
          CORE_BUMP=$(determine_bump "$USER_BUMP" ${{ steps.analyze.outputs.core_feat }} ${{ steps.analyze.outputs.core_break }})
          UI_BUMP=$(determine_bump "$USER_BUMP" ${{ steps.analyze.outputs.ui_feat }} ${{ steps.analyze.outputs.ui_break }})
          
          calc_version() {
            local version=$1
            local bump=$2
            IFS='.' read -r major minor patch <<< "$version"
            case "$bump" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            echo "$major.$minor.$patch"
          }
          
          CORE_NEW=$(calc_version ${{ steps.versions.outputs.core }} "$CORE_BUMP")
          UI_NEW=$(calc_version ${{ steps.versions.outputs.ui }} "$UI_BUMP")
          
          echo "core=$CORE_NEW" >> $GITHUB_OUTPUT
          echo "ui=$UI_NEW" >> $GITHUB_OUTPUT
          
          # Check if there are any commits since last release
          CORE_HAS_COMMITS=$(echo "$CORE_COMMITS" | grep -c . || echo "0")
          UI_HAS_COMMITS=$(echo "$UI_COMMITS" | grep -c . || echo "0")
          
          if [ "$CORE_HAS_COMMITS" -eq 0 ] && [ "$UI_HAS_COMMITS" -eq 0 ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No commits since last release, skipping release"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Update versions in Cargo.toml
        if: steps.new_versions.outputs.should_release == 'true'
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.new_versions.outputs.core }}\"/" lib/harper-core/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"${{ steps.new_versions.outputs.ui }}\"/" lib/harper-ui/Cargo.toml

      - name: Create release branch
        if: steps.new_versions.outputs.should_release == 'true'
        run: |
          CORE_NEW=${{ steps.new_versions.outputs.core }}
          UI_NEW=${{ steps.new_versions.outputs.ui }}
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git checkout -b "release/harper-core-$CORE_NEW-harper-ui-$UI_NEW"

      - name: Stage and commit
        if: steps.new_versions.outputs.should_release == 'true'
        run: |
          CORE_NEW=${{ steps.new_versions.outputs.core }}
          UI_NEW=${{ steps.new_versions.outputs.ui }}
          
          git add -A
          git commit -m "[lib] release harper-core $CORE_NEW, harper-ui $UI_NEW"

      - name: Create Pull Request
        if: steps.new_versions.outputs.should_release == 'true'
        uses: actions/create-pull-request@v7
        with:
          branch: release/harper-core-${{ steps.new_versions.outputs.core }}-harper-ui-${{ steps.new_versions.outputs.ui }}
          title: "[lib] release harper-core ${{ steps.new_versions.outputs.core }}, harper-ui ${{ steps.new_versions.outputs.ui }}"
          body: |
            Release PR for:
            - harper-core: ${{ steps.versions.outputs.core }} → ${{ steps.new_versions.outputs.core }}
            - harper-ui: ${{ steps.versions.outputs.ui }} → ${{ steps.new_versions.outputs.ui }}

            Last release tags:
            - harper-core: ${{ steps.analyze.outputs.core_last_tag }}
            - harper-ui: ${{ steps.analyze.outputs.ui_last_tag }}

            Commits analyzed:
            - harper-core: ${{ steps.analyze.outputs.core_feat }} features, ${{ steps.analyze.outputs.core_fix }} fixes
            - harper-ui: ${{ steps.analyze.outputs.ui_feat }} features, ${{ steps.analyze.outputs.ui_fix }} fixes

            Please review and merge to trigger the release.
          base: main
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}