name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'harper-*'
    paths:
      - 'lib/harper-core/**'
      - 'lib/harper-ui/**'
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_mode:
        description: 'Release mode'
        required: false
        type: choice
        options:
          - pr
          - direct
          - merge

jobs:
  release-pr:
    if: (github.event_name == 'push' && github.ref_type != 'tag') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: libnudget/release@v1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release_token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          packages: '[{"path": "lib/harper-core", "name": "harper-core"}, {"path": "lib/harper-ui", "name": "harper-ui"}, {"path": "lib/harper-firmware", "name": "harper-firmware"}, {"path": "lib/harper-mcp-server", "name": "harper-mcp-server"}, {"path": "lib/harper-sandbox", "name": "harper-sandbox"}]'
          version_bump: ${{ github.event.inputs.version_bump || 'patch' }}
          release_mode: ${{ github.event.inputs.release_mode || 'pr' }}

  create-tags:
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'closed' &&
       github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.release_mode == 'merge')
    runs-on: ubuntu-latest
    steps:
      - uses: libnudget/release@v1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: '[{"path": "lib/harper-core", "name": "harper-core"}, {"path": "lib/harper-ui", "name": "harper-ui"}, {"path": "lib/harper-firmware", "name": "harper-firmware"}, {"path": "lib/harper-mcp-server", "name": "harper-mcp-server"}, {"path": "lib/harper-sandbox", "name": "harper-sandbox"}]'
          release_mode: merge

  release-assets:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    uses: libnudget/release-assets/.github/workflows/release-assets.yml@main
    with:
      release_tag: ${{ github.ref_name }}
      release_target_sha: ${{ github.sha }}
      binary_name: harper
      package_path: lib/harper-ui
      manifest_name: release-manifest.json
      public_key_b64: BDOY84nu7unipalQUWLr4dyBTisXYX/+9oyPdBQiZBo=
      targets_json: >-
        [
          {
            "target_key":"linux-x86_64",
            "runner":"ubuntu-latest",
            "rust_target":"x86_64-unknown-linux-gnu",
            "binary_path":"target/x86_64-unknown-linux-gnu/release/harper",
            "archive_name":"harper-linux-x86_64.tar.gz",
            "archive_format":"tar.gz",
            "smoke":true,
            "setup_script":"",
            "build_env_json":""
          },
          {
            "target_key":"linux-aarch64",
            "runner":"ubuntu-latest",
            "rust_target":"aarch64-unknown-linux-gnu",
            "binary_path":"target/aarch64-unknown-linux-gnu/release/harper",
            "archive_name":"harper-linux-aarch64.tar.gz",
            "archive_format":"tar.gz",
            "smoke":false,
            "setup_script":"sudo dpkg --add-architecture arm64 && sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64 pkg-config",
            "build_env_json":"{\"CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER\":\"aarch64-linux-gnu-gcc\",\"PKG_CONFIG_ALLOW_CROSS\":\"1\",\"AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_LIB_DIR\":\"/usr/lib/aarch64-linux-gnu\",\"AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_INCLUDE_DIR\":\"/usr/include\"}"
          },
          {
            "target_key":"macos-x86_64",
            "runner":"macos-13",
            "rust_target":"x86_64-apple-darwin",
            "binary_path":"target/x86_64-apple-darwin/release/harper",
            "archive_name":"harper-macos-x86_64.tar.gz",
            "archive_format":"tar.gz",
            "smoke":true,
            "setup_script":"",
            "build_env_json":""
          },
          {
            "target_key":"macos-aarch64",
            "runner":"macos-14",
            "rust_target":"aarch64-apple-darwin",
            "binary_path":"target/aarch64-apple-darwin/release/harper",
            "archive_name":"harper-macos-aarch64.tar.gz",
            "archive_format":"tar.gz",
            "smoke":true,
            "setup_script":"",
            "build_env_json":""
          },
          {
            "target_key":"windows-x86_64",
            "runner":"windows-latest",
            "rust_target":"x86_64-pc-windows-msvc",
            "binary_path":"target/x86_64-pc-windows-msvc/release/harper.exe",
            "archive_name":"harper-windows-x86_64.zip",
            "archive_format":"zip",
            "smoke":true,
            "setup_script":"",
            "build_env_json":""
          }
        ]
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
      signing_key_pem_b64: ${{ secrets.HARPER_UPDATE_SIGNING_KEY_PEM_B64 }}
