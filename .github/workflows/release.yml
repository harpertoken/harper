name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'lib/harper-core/**'
      - 'lib/harper-ui/**'
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_mode:
        description: 'Release mode'
        required: false
        type: choice
        options:
          - pr
          - direct
          - merge

jobs:
  release-pr:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: libnudget/release@v1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release_token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          packages: '[{"path": "lib/harper-core", "name": "harper-core"}, {"path": "lib/harper-ui", "name": "harper-ui"}]'
          version_bump: ${{ github.event.inputs.version_bump || 'patch' }}
          release_mode: ${{ github.event.inputs.release_mode || 'pr' }}

  create-tags:
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'closed' &&
       github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.release_mode == 'merge')
    runs-on: ubuntu-latest
    steps:
      - uses: libnudget/release@v1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: '[{"path": "lib/harper-core", "name": "harper-core"}, {"path": "lib/harper-ui", "name": "harper-ui"}]'
          release_mode: merge
