name: Package Test

on:
  push:
    tags:
      - 'harper-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-preflight:
    if: github.repository_owner == 'harpertoken'
    uses: libnudget/release-assets/.github/workflows/release-assets.yml@main
    with:
      release_tag: ${{ github.ref_name || 'workflow-dispatch' }}
      release_target_sha: ${{ github.sha }}
      binary_name: harper
      package_path: lib/harper-ui
      manifest_name: release-manifest.json
      public_key_b64: BDOY84nu7unipalQUWLr4dyBTisXYX/+9oyPdBQiZBo=
      publish_assets: false
      targets_json: >-
        [
          {
            "target_key":"linux-x86_64",
            "runner":"ubuntu-latest",
            "rust_target":"x86_64-unknown-linux-gnu",
            "binary_path":"target/x86_64-unknown-linux-gnu/release/harper",
            "archive_name":"harper-linux-x86_64.tar.gz",
            "archive_format":"tar.gz",
            "smoke":true,
            "setup_script":"",
            "build_env_json":""
          },
          {
            "target_key":"linux-aarch64",
            "runner":"ubuntu-latest",
            "rust_target":"aarch64-unknown-linux-gnu",
            "binary_path":"target/aarch64-unknown-linux-gnu/release/harper",
            "archive_name":"harper-linux-aarch64.tar.gz",
            "archive_format":"tar.gz",
            "smoke":false,
            "setup_script":"sudo dpkg --add-architecture arm64 && if [ -f /etc/apt/sources.list.d/ubuntu.sources ] && ! sudo grep -q '^Architectures: amd64$' /etc/apt/sources.list.d/ubuntu.sources; then sudo sed -i '/^Types: deb$/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources; fi && for file in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do [ -f \"$file\" ] || continue; sudo perl -0pi -e 's/^deb\\s+(https?:\\/\\/(?:azure\\.archive|archive|security)\\.ubuntu\\.com\\/ubuntu)/deb [arch=amd64] $1/gm' \"$file\"; done && printf '%s\n' 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe restricted multiverse' 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe restricted multiverse' 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-backports main universe restricted multiverse' 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe restricted multiverse' | sudo tee /etc/apt/sources.list.d/ubuntu-arm64.list >/dev/null && sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64 pkg-config",
            "build_env_json":"{\"CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER\":\"aarch64-linux-gnu-gcc\",\"PKG_CONFIG_ALLOW_CROSS\":\"1\",\"AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_LIB_DIR\":\"/usr/lib/aarch64-linux-gnu\",\"AARCH64_UNKNOWN_LINUX_GNU_OPENSSL_INCLUDE_DIR\":\"/usr/include\"}"
          },
          {
            "target_key":"macos-x86_64",
            "runner":"macos-13",
            "rust_target":"x86_64-apple-darwin",
            "binary_path":"target/x86_64-apple-darwin/release/harper",
            "archive_name":"harper-macos-x86_64.tar.gz",
            "archive_format":"tar.gz",
            "smoke":true,
            "setup_script":"",
            "build_env_json":""
          },
          {
            "target_key":"macos-aarch64",
            "runner":"macos-14",
            "rust_target":"aarch64-apple-darwin",
            "binary_path":"target/aarch64-apple-darwin/release/harper",
            "archive_name":"harper-macos-aarch64.tar.gz",
            "archive_format":"tar.gz",
            "smoke":true,
            "setup_script":"",
            "build_env_json":""
          },
          {
            "target_key":"windows-x86_64",
            "runner":"windows-latest",
            "rust_target":"x86_64-pc-windows-msvc",
            "binary_path":"target/x86_64-pc-windows-msvc/release/harper.exe",
            "archive_name":"harper-windows-x86_64.zip",
            "archive_format":"zip",
            "smoke":true,
            "setup_script":"",
            "build_env_json":""
          }
        ]
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
      signing_key_pem_b64: ${{ secrets.HARPER_UPDATE_SIGNING_KEY_PEM_B64 }}
