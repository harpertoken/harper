name: Update Rust lockfiles

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.15.0

      - name: Clear stale Bazel cache
        run: |
          bazel shutdown 2>/dev/null || true
          rm -rf /home/runner/.cache/bazel /home/runner/.cache/bazelisk /home/runner/.bazel /home/runner/.bazelrc
          rm -rf /home/runner/.cache/bazel-external /home/runner/.bazel/external
          rm -rf /tmp/*bazel* 2>/dev/null || true

      - name: Update Cargo.lock
        run: cargo update

      - name: Update cargo-bazel-lock.json
        run: |
          set -euo pipefail
          bazel shutdown
          rm -f cargo-bazel-lock.json
          CARGO_BAZEL_REPIN=true bazel build :harper_bin 2>/dev/null || true
          bazel shutdown

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(deps): update Rust lockfiles'
          title: 'chore(deps): update Rust lockfiles'
          body: |
            ## Summary
            - update `Cargo.lock`
            - repin `cargo-bazel-lock.json` to keep Bazel dependencies in sync
          branch: cargo-lock-update
          delete-branch: true
