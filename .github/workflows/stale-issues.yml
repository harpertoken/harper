name: Stale

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  remind-stale-issues:
    name: Mark Stale
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.repository_owner == 'harpertoken'
    steps:
      - id: app-token
        name: Create Harper app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HARPER_APP_ID }}
          private-key: ${{ secrets.HARPER_APP_PRIVATE_KEY }}
          permission-issues: write

      - name: Remind on stale issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const labelName = 'needs-response';
            const reminderDays = 30;
            const closeDays = 14;
            const now = Date.now();
            const reminderCutoff = now - reminderDays * 24 * 60 * 60 * 1000;
            const closeCutoff = now - closeDays * 24 * 60 * 60 * 1000;

            const reminderMessage =
              'This issue has been inactive for 30 days. If it still matters, leave a comment and it will stay open. Otherwise it will close after 14 more days.';
            const closeMessage =
              'Closing due to inactivity. If this still matters, reply here and we can reopen it.';

            const { owner, repo } = context.repo;

            try {
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: labelName,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: 'fbca04',
                description: 'Issue is waiting for reporter response',
              });
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              sort: 'updated',
              direction: 'asc',
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) {
                continue;
              }

              const updatedAt = Date.parse(issue.updated_at);
              const hasNeedsResponse = issue.labels.some((label) =>
                (typeof label === 'string' ? label : label.name) === labelName
              );

              if (hasNeedsResponse) {
                if (updatedAt <= closeCutoff) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issue.number,
                    body: closeMessage,
                  });

                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: issue.number,
                    state: 'closed',
                  });
                }

                continue;
              }

              if (updatedAt > reminderCutoff) {
                continue;
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [labelName],
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: reminderMessage,
              });
            }

  clear-needs-response:
    name: Clear Response
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment' && github.repository_owner == 'harpertoken' && github.event.issue.pull_request == null && github.event.comment.user.type != 'Bot'
    steps:
      - id: app-token
        name: Create Harper app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HARPER_APP_ID }}
          private-key: ${{ secrets.HARPER_APP_PRIVATE_KEY }}
          permission-issues: write

      - name: Clear waiting label on reply
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const labelName = 'needs-response';
            const issue = context.payload.issue;
            const hasLabel = issue.labels.some((label) => label.name === labelName);

            if (!hasLabel) {
              core.info('Issue is not waiting for response.');
              return;
            }

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              name: labelName,
            });
