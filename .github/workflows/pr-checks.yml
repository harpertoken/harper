name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-check:
    name: PR validation
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' || github.event_name == 'pull_request') &&
      github.repository_owner == 'harpertoken' &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false))

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR metadata
        uses: ./.github/actions/pr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.repository_owner == 'harpertoken'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - id: app-token
        name: Create Harper app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HARPER_APP_ID }}
          private-key: ${{ secrets.HARPER_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - uses: actions/labeler@v6
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
          configuration-path: config/labeler.yml
