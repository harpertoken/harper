---
name: Milestone

on:
  pull_request_target:
    types: [opened, reopened, edited, labeled, unlabeled, ready_for_review]

jobs:
  assign-pr-milestone:
    name: Milestone
    runs-on: ubuntu-latest
    if: github.repository_owner == 'harpertoken'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - id: app-token
        name: Create Harper app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HARPER_APP_ID }}
          private-key: ${{ secrets.HARPER_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-pull-requests: read

      - name: Assign milestone
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          EVENT_PATH: ${{ github.event_path }}
        run: |
          set -euo pipefail

          pr_number=$(jq -r '.pull_request.number' "$EVENT_PATH")
          title=$(jq -r '.pull_request.title // ""' "$EVENT_PATH" | tr '[:upper:]' '[:lower:]')
          labels=$(jq -r '[.pull_request.labels[].name] | join(" ")' "$EVENT_PATH" | tr '[:upper:]' '[:lower:]')
          current_milestone=$(jq -r '.pull_request.milestone.number // empty' "$EVENT_PATH")

          if [[ -n "$current_milestone" ]]; then
            echo "PR #$pr_number already has milestone #$current_milestone"
            exit 0
          fi

          milestone=5
          if [[ "$title $labels" =~ (ci|build|release|workflow|homebrew|lockfile|cargo\.lock|cla|commitlint|pr[[:space:]-]?title|bazel|dependabot|deps|dependencies) ]]; then
            milestone=4
          elif [[ "$title $labels" =~ (auth|planning|plan|agents?|routing|intent|mcp|sandbox|approval|workspace|account|session|profile|sse|server) ]]; then
            milestone=6
          fi

          gh api "repos/$REPO/issues/$pr_number" \
            -X PATCH \
            -F "milestone=$milestone" \
            --silent

          echo "Assigned PR #$pr_number to milestone #$milestone"
