name: Rust Auto-Fix Bot
on:
  issue_comment:
    types: [created]

jobs:
  rust-auto-fix-request:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/rust-fix') && github.repository_owner == 'harpertoken'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Check fix type
      id: check
      run: |
        comment="${{ github.event.comment.body }}"
        fixes=""
        if [[ "$comment" == *"/rust-fix all"* ]]; then fixes="all"
        elif [[ "$comment" == *"/rust-fix clippy"* ]]; then fixes="clippy"
        elif [[ "$comment" == *"/rust-fix fmt"* ]]; then fixes="fmt"
        fi
        echo "fixes=$fixes" >> $GITHUB_OUTPUT

    - name: Comment confirmation
      if: steps.check.outputs.fixes != ''
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `Applying: ${{ steps.check.outputs.fixes }}`
          });

  rust-auto-fix-execute:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/confirm') && github.repository_owner == 'harpertoken'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    - name: Checkout PR
      run: gh pr checkout ${{ github.event.issue.number }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt, clippy
    - name: Apply fix
      uses: libnudget/rust-fix@v1
      with:
        fixes: all
