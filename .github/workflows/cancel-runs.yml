name: Cancel Runs Bot

on:
  issue_comment:
    types: [created]

concurrency:
  group: cancel-runs-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  cancel-runs:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/cancel-runs') && github.repository_owner == 'harpertoken'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4

    - name: Get PR branch name
      id: get-branch
      run: |
        branch=$(gh pr view "$PR_NUM" --json headRefName --jq '.headRefName')
        echo "branch=$branch" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUM: ${{ github.event.issue.number }}

    - name: Cancel runs
      uses: libnudget/cancel@v1
      with:
        branch: ${{ steps.get-branch.outputs.branch }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Post comment
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: 'Done'
          });
