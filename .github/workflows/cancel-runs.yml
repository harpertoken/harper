name: Cancel Runs Bot

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]

concurrency:
  group: cancel-runs-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cancel-runs:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/cancel-runs') && github.repository_owner == 'harpertoken'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4

    - name: Get PR branch name
      id: get-branch
      run: |
        branch=$(gh pr view "$PR_NUM" --json headRefName --jq '.headRefName')
        echo "branch=$branch" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUM: ${{ github.event.issue.number }}

    - name: Cancel runs
      uses: libnudget/cancel@v1
      with:
        branch: ${{ steps.get-branch.outputs.branch }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Post comment
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: 'Done'
          });

  cancel-runs-label:
    if: github.event.label.name == 'cancel-runs' && github.repository_owner == 'harpertoken'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      pull-requests: write
    steps:
    - uses: libnudget/cancel@v1
      with:
        pr_number: ${{ github.event.pull_request.number }}
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Post comment
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.createComment({
            issue_number: context.payload.pull_request.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: 'Cancelled workflow runs for this PR'
          });
