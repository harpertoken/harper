name: Auto Merge

on:
  pull_request_target:
    types: [labeled, unlabeled, opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      !contains(github.event.pull_request.labels.*.name, 'auto-merge-now') &&
      github.event.pull_request.draft == false &&
      github.repository_owner == 'harpertoken'
    steps:
      - id: app-token
        name: Create Harper app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HARPER_APP_ID }}
          private-key: ${{ secrets.HARPER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: libnudget/auto-merge@v1
        with:
          mode: enable
          token: ${{ steps.app-token.outputs.token }}

  cancel-auto-merge:
    name: Cancel Auto Merge
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'unlabeled' &&
      github.event.label.name == 'auto-merge' &&
      github.event.pull_request.draft == false &&
      github.repository_owner == 'harpertoken'
    steps:
      - id: app-token
        name: Create Harper app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HARPER_APP_ID }}
          private-key: ${{ secrets.HARPER_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - uses: libnudget/auto-merge@v1
        with:
          mode: disable
          token: ${{ steps.app-token.outputs.token }}

  auto-merge-now:
    name: Merge Now
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'auto-merge-now') &&
      github.event.pull_request.draft == false &&
      github.repository_owner == 'harpertoken'
    steps:
      - id: app-token
        name: Create Harper app token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HARPER_APP_ID }}
          private-key: ${{ secrets.HARPER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: libnudget/auto-merge@v1
        with:
          mode: now
          token: ${{ steps.app-token.outputs.token }}
          bypass_token: ${{ secrets.BYPASS_TOKEN }}
