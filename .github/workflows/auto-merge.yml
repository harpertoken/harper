name: Auto Merge

on:
  pull_request_target:
    types: [labeled, unlabeled, opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      !contains(github.event.pull_request.labels.*.name, 'auto-merge-now') &&
      github.event.pull_request.draft == false &&
      github.repository_owner == 'harpertoken'
    steps:
      - uses: libnudget/auto-merge@v1
        with:
          mode: enable

  cancel-auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'unlabeled' &&
      github.event.label.name == 'auto-merge' &&
      github.event.pull_request.draft == false &&
      github.repository_owner == 'harpertoken'
    steps:
      - uses: libnudget/auto-merge@v1
        with:
          mode: disable

  auto-merge-now:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.pull_request.labels.*.name, 'auto-merge-now') &&
      github.event.pull_request.draft == false &&
      github.repository_owner == 'harpertoken'
    steps:
      - name: Merge immediately
        run: gh pr merge --squash --admin "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.BYPASS_TOKEN || secrets.GITHUB_TOKEN }}