name: Lock Merged PRs

on:
  pull_request:
    types: [closed]
  pull_request_target:
    types: [closed]

jobs:
  lock:
    if: github.event.pull_request.merged == true && github.repository_owner == 'harpertoken'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Lock PR
        run: gh pr lock ${{ github.event.pull_request.number }} --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
