<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harper · Changelog</title>
    <meta name="harper-update-version" content="2026-04-28-changelog" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/203538727?s=200&v=4" />
</head>
<body>
    <div class="page">
        <header class="site-header">
            <div class="brand"><img src="https://avatars.githubusercontent.com/u/203538727?s=200&v=4" alt="" />HARPER<span>·AI</span></div>
            <nav class="nav">
                <a href="index.html" data-update-target="home">Home</a>
                <a href="installation.html" data-update-target="install">Install</a>
                <a href="troubleshooting.html" data-update-target="troubleshooting">Troubleshooting</a>
                <a href="blog.html" data-update-target="blog">Blog</a>
                <a href="changelog.html" data-update-target="changelog" aria-current="page">Changelog</a>
                <a href="server.html" data-update-target="server">API Server</a>
                <a href="terms.html" data-update-target="terms">Terms</a>
                <a href="privacy.html" data-update-target="privacy">Privacy</a>
            </nav>
        </header>

        <main class="surface">
            <div class="content-container">
                <h1 class="hero-title">Changelog</h1>
                <p class="hero-lede">Release history from GitHub, with a plain fallback when the live fetch is unavailable.</p>

                <div id="releases">
                    <p class="loading">Fetching releases...</p>
                    <noscript>
                        <p>JavaScript is disabled. Use <a href="https://github.com/harpertoken/harper/releases" target="_blank" rel="noreferrer">the GitHub releases page</a>.</p>
                    </noscript>
                </div>
            </div>
        </main>

        <footer class="footnote">
            <a class="button secondary" href="index.html">← Back</a>
        </footer>
    </div>
    <script src="nav-updates.js"></script>
    <script>
        const header = document.querySelector('.site-header');
        window.addEventListener('scroll', () => {
            header.classList.toggle('scrolled', window.scrollY > 50);
        });

        fetch('https://api.github.com/repos/harpertoken/harper/releases?per_page=10', {
            headers: { 'Accept': 'application/vnd.github+json' }
        })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(releases => {
            const container = document.getElementById('releases');
            if (!releases.length) {
                container.innerHTML = '<p>No releases found.</p>';
                return;
            }
            container.innerHTML = releases.slice(0, 5).map(rel => {
                const date = rel.published_at ? new Date(rel.published_at).toLocaleDateString() : '';
                const body = rel.body
                    ? rel.body.split('\n').filter(Boolean).slice(0, 3).join(' ').slice(0, 360)
                    : 'No description.';
                return `<h2>${rel.tag_name}${date ? ' <span>' + date + '</span>' : ''}</h2>
                <p>${body}${rel.body && body.length < rel.body.length ? '…' : ''}</p>
                <p><a href="${rel.html_url}" target="_blank" rel="noreferrer">View on GitHub →</a></p>`;
            }).join('') + '<h2>All releases</h2><p><a href="https://github.com/harpertoken/harper/releases" target="_blank">github.com/harpertoken/harper/releases →</a></p>';
        })
        .catch(() => {
            document.getElementById('releases').innerHTML = `
                <h2>Fallback</h2>
                <p>Could not load the live release feed from GitHub in this browser.</p>
                <p>Use the canonical release history here:</p>
                <p><a href="https://github.com/harpertoken/harper/releases" target="_blank" rel="noreferrer">github.com/harpertoken/harper/releases →</a></p>
            `;
        });
    </script>
</body>
</html>
