[api]
provider = "OpenAI"
api_key = "your_api_key_here"
base_url = "https://api.openai.com/v1/chat/completions"
model_name = "gpt-4-turbo"
# To run fully offline with Ollama:
# provider = "Ollama"
# api_key = ""
# base_url = "http://localhost:11434/api/chat"
# model_name = "llama3"

[database]
path = ".harper/sessions.db"

[mcp]
enabled = false
server_url = "http://localhost:5001"

[prompts]
system_prompt_id = "default"

[ui]
theme = "default"

[tools]
# enabled_tools = ["read_file", "write_file", "run_command"]
# disabled_tools = []

[exec_policy]
# allowed_commands = ["ls", "cat", "grep"]
# blocked_commands = []

[custom_commands]
# commands = { "hello" = "Say hello to the user", "status" = "Show system status" }

[firmware]
enabled = true

# [[firmware.devices]]
# name = "my-esp32"
# platform = "esp32"
# port = "/dev/ttyUSB0"

# [[firmware.devices]]
# name = "my-stm32"
# platform = "stm32"
# port = "/dev/ttyUSB1"

[exec_policy.sandbox]
enabled = false
allowed_dirs = []
# network_access = false
# readonly_home = true
# max_execution_time_secs = 30

[server]
enabled = false
host = "127.0.0.1"
port = 8080

